<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--MERRIWEATHER-->
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Merriweather+Sans:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!--DM-SERIF-->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Text:ital@0;1&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="style.css" />

    <!--MATERIAL ICONS-->
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <title>noteous</title>
    <link rel="shortcut icon" href="./img/favicon.png" type="image/x-icon" />
  </head>
  <body id="index">
    <header>
      <nav>
        <a href="index.html" tabindex="1"><h1 id="logo">noteous</h1></a>
        <div id="nav-options">
          <button id="theme-container" tabindex="2">
            <p>Tema</p>
            <div id="theme-color"></div>
          </button>
          <a id="nav-update" href="about.html" tabindex="3">Saiba Mais</a>
        </div>
      </nav>
    </header>
    <main>
      <section id="section-write">
        <div id="info-panel"></div>
        <div id="write-panel">
          <label id="write-label" for="write-input"
            >Qual o próximo passo?</label
          >
          <button id="write-options" tabindex="5"></button>
          <textarea
            id="write-input"
            type="text"
            autofocus
            placeholder="✔ Sua próxima tarefa ou lembrete"
            aria-placeholder="Escreva sua próxima tarefa ou lembrete"
            tabindex="4"
          ></textarea>
          <div id="write-buttons-container">
            <button
              id="write-button-add"
              class="write-buttons"
              role="button"
              aria-label="Adicionar nota"
              tabindex="6"
            >
              + adicionar nota
            </button>
            <button
              id="write-button-edit"
              class="write-buttons"
              hidden="true"
              aria-label="Editar nota"
              tabindex="7"
            >
              <span class="material-icons"> check_circle </span>
            </button>
            <button
              id="write-button-cancel"
              class="write-buttons"
              hidden="true"
              tabindex="8"
            >
              <span class="material-icons"> block </span>
            </button>
          </div>
        </div>
      </section>

      <section id="section-read">
        <div id="read-options">
          <button id="read-options-sort" tabindex="9"></button>
        </div>

        <div id="read-panel">
          <div id="read-notes"></div>
        </div>
      </section>
    </main>

    <footer>
      <p><span>noteous</span> 1ª Geração • v1.4.6</p>
    </footer>

    <script type="text/javascript" src="index.js"></script>
  </body>
</html>
